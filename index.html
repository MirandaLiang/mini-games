<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mini Games Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #000; color: #fff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; }
  button { font-family: inherit; }

  /* ── Hub ── */
  .hub { max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; font-size: 15px; font-weight: 600; }
  .hub-title { font-size: 34px; font-weight: 800; padding: 16px 24px 12px; animation: fadeUp 0.5s ease both; }
  .tabs { display: flex; gap: 8px; padding: 0 24px 20px; animation: fadeUp 0.5s ease 0.05s both; }
  .tab { background: #1C1C1E; border-radius: 20px; padding: 8px 16px; display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 600; border: 1px solid #2C2C2E; }

  .featured-card { margin: 0 20px 24px; border-radius: 16px; overflow: hidden; background: linear-gradient(135deg, #1C1C1E, #2C2C2E); border: 1px solid #2C2C2E; animation: fadeUp 0.6s ease 0.1s both; }
  .featured-label { font-size: 11px; font-weight: 700; color: #0A84FF; letter-spacing: 1px; text-transform: uppercase; }
  .featured-name { font-size: 22px; font-weight: 700; margin: 4px 0 2px; }
  .featured-tag { font-size: 15px; color: #8E8E93; }
  .featured-hero { margin: 16px 20px 20px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; height: 180px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .featured-hero::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent, transparent calc(11.1% - 0.5px), rgba(255,255,255,0.08) calc(11.1% - 0.5px), rgba(255,255,255,0.08) calc(11.1% + 0.5px)); }
  .featured-hero::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent calc(11.1% - 0.5px), rgba(255,255,255,0.08) calc(11.1% - 0.5px), rgba(255,255,255,0.08) calc(11.1% + 0.5px)); }
  .featured-emoji { font-size: 80px; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4)); position: relative; z-index: 1; }

  .section-title { font-size: 22px; font-weight: 700; padding: 0 24px; }
  .section-sub { font-size: 15px; color: #8E8E93; padding: 2px 24px 12px; }

  .game-row { display: flex; align-items: center; gap: 14px; padding: 14px 24px; border-bottom: 0.5px solid #2C2C2E; animation: slideIn 0.4s ease both; }
  .game-row:last-child { border-bottom: none; }
  .game-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
  .game-info { flex: 1; min-width: 0; }
  .game-name { font-size: 17px; font-weight: 600; line-height: 1.2; }
  .game-tag { font-size: 13px; color: #8E8E93; margin-top: 2px; }
  .play-btn { background: #1C1C1E; border: none; border-radius: 16px; padding: 7px 20px; color: #0A84FF; font-size: 15px; font-weight: 700; cursor: pointer; flex-shrink: 0; transition: transform 0.1s; }
  .play-btn:active { transform: scale(0.95); }

  .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid #2C2C2E; display: flex; justify-content: space-around; padding: 8px 0 20px; z-index: 100; }
  .tab-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; font-weight: 500; cursor: pointer; }
  .tab-item.active { color: #0A84FF; }
  .tab-item:not(.active) { color: #8E8E93; }
  .home-indicator { position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; background: #fff; z-index: 101; }

  /* ── Shared Game Styles ── */
  .game-screen { max-width: 430px; margin: 0 auto; min-height: 100vh; }
  .game-header { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  .back-btn { background: none; border: none; color: #0A84FF; font-size: 17px; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px; }
  .back-arrow { display: inline-block; margin-right: 2px; }

  /* ── Sudoku ── */
  .diff-card { background: #1C1C1E; border: 1px solid #2C2C2E; border-radius: 14px; padding: 16px 20px; color: #fff; font-size: 17px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 12px; text-align: left; width: 100%; margin-bottom: 12px; }
  .diff-card:hover { background: #2C2C2E; }
  .diff-sub { font-size: 13px; color: #8E8E93; font-weight: 400; }

  .sudoku-grid { display: grid; grid-template-columns: repeat(9, 1fr); width: min(88vw, 360px); aspect-ratio: 1; border: 2px solid #48484A; border-radius: 8px; overflow: hidden; margin: 8px auto; }
  .sudoku-cell { width: 100%; aspect-ratio: 1; border: none; font-size: min(5vw, 20px); font-family: 'Inter', sans-serif; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }

  .numpad { display: flex; justify-content: center; gap: 6px; padding: 20px 16px 8px; flex-wrap: wrap; }
  .num-btn { width: 40px; height: 48px; border-radius: 10px; background: #1C1C1E; border: 1px solid #2C2C2E; color: #0A84FF; font-size: 20px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .num-btn:active { background: #2C2C2E; }
  .action-btns { display: flex; justify-content: center; gap: 8px; padding: 8px 16px 24px; }
  .action-btn { padding: 10px 24px; border-radius: 10px; background: #1C1C1E; border: 1px solid #2C2C2E; font-size: 15px; font-weight: 500; cursor: pointer; }

  /* ── Memory ── */
  .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 24px 20px; max-width: 360px; margin: 0 auto; }
  .mem-card { aspect-ratio: 1; border-radius: 12px; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.3s, background 0.3s; }
  .mem-card:active { transform: scale(0.95); }

  /* ── 2048 ── */
  .grid-2048 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 16px 20px; max-width: 340px; margin: 0 auto; }
  .tile-2048 { aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; transition: background 0.15s; }

  .center-content { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 24px; }
  .big-emoji { font-size: 64px; margin-bottom: 12px; }
  .big-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .sub-text { color: #8E8E93; font-size: 17px; margin-bottom: 4px; }
  .primary-btn { background: #0A84FF; color: #fff; border: none; border-radius: 12px; padding: 14px 40px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 24px; }
  .primary-btn:active { opacity: 0.8; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ══════════════════════════════════════
// SUDOKU GENERATOR
// ══════════════════════════════════════
function generateSudoku(difficulty) {
  const board = Array.from({ length: 9 }, () => Array(9).fill(0));
  function isValid(b, r, c, n) {
    for (let i = 0; i < 9; i++) if (b[r][i] === n || b[i][c] === n) return false;
    const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
    for (let i = br; i < br+3; i++) for (let j = bc; j < bc+3; j++) if (b[i][j] === n) return false;
    return true;
  }
  function solve(b) {
    for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) {
      if (b[r][c] === 0) {
        const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random()-0.5);
        for (const n of nums) { if (isValid(b,r,c,n)) { b[r][c]=n; if (solve(b)) return true; b[r][c]=0; } }
        return false;
      }
    }
    return true;
  }
  solve(board);
  const solution = board.map(r => [...r]);
  const puzzle = board.map(r => [...r]);
  const removes = difficulty==="easy"?35:difficulty==="medium"?45:55;
  let removed = 0;
  while (removed < removes) {
    const r=Math.floor(Math.random()*9), c=Math.floor(Math.random()*9);
    if (puzzle[r][c]!==0) { puzzle[r][c]=0; removed++; }
  }
  return { puzzle, solution };
}

// ══════════════════════════════════════
// SUDOKU GAME
// ══════════════════════════════════════
function SudokuGame({ onBack }) {
  const [difficulty, setDifficulty] = useState(null);
  const [game, setGame] = useState(null);
  const [board, setBoard] = useState(null);
  const [selected, setSelected] = useState(null);
  const [errors, setErrors] = useState(new Set());
  const [won, setWon] = useState(false);
  const [timer, setTimer] = useState(0);
  const timerRef = useRef(null);

  const startGame = (diff) => {
    setDifficulty(diff);
    const g = generateSudoku(diff);
    setGame(g); setBoard(g.puzzle.map(r=>[...r]));
    setSelected(null); setErrors(new Set()); setWon(false); setTimer(0);
    timerRef.current = setInterval(() => setTimer(t=>t+1), 1000);
  };
  useEffect(() => () => clearInterval(timerRef.current), []);

  const handleNum = (n) => {
    if (!selected||won) return;
    const [r,c] = selected;
    if (game.puzzle[r][c]!==0) return;
    const nb = board.map(row=>[...row]); nb[r][c]=n; setBoard(nb);
    const ne = new Set(errors);
    if (n!==game.solution[r][c]) ne.add(`${r}-${c}`); else ne.delete(`${r}-${c}`);
    setErrors(ne);
    let complete=true;
    for (let i=0;i<9;i++) for (let j=0;j<9;j++) if (nb[i][j]!==game.solution[i][j]) complete=false;
    if (complete) { setWon(true); clearInterval(timerRef.current); }
  };
  const handleErase = () => {
    if (!selected||won) return; const [r,c]=selected;
    if (game.puzzle[r][c]!==0) return;
    const nb=board.map(row=>[...row]); nb[r][c]=0; setBoard(nb);
    const ne=new Set(errors); ne.delete(`${r}-${c}`); setErrors(ne);
  };
  const handleHint = () => {
    if (!selected||won) return; const [r,c]=selected;
    if (game.puzzle[r][c]!==0) return;
    const nb=board.map(row=>[...row]); nb[r][c]=game.solution[r][c]; setBoard(nb);
    const ne=new Set(errors); ne.delete(`${r}-${c}`); setErrors(ne);
  };
  const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  // Difficulty select
  if (!difficulty) return (
    <div className="game-screen">
      <div className="game-header">
        <button className="back-btn" onClick={onBack}><span className="back-arrow">‹</span> Games</button>
      </div>
      <div style={{padding:"0 24px", textAlign:"center"}}>
        <div style={{fontSize:64,marginBottom:8}}>🧩</div>
        <div className="big-title">Mini Sudoku</div>
        <p className="sub-text" style={{marginBottom:40}}>Train your brain with numbers</p>
        {[["easy","Easy","🟢","35 cells removed"],["medium","Medium","🟡","45 cells removed"],["hard","Hard","🔴","55 cells removed"]].map(([k,l,e,d])=>(
          <button key={k} className="diff-card" onClick={()=>startGame(k)}>
            <span style={{fontSize:24}}>{e}</span>
            <div><div>{l}</div><div className="diff-sub">{d}</div></div>
          </button>
        ))}
      </div>
    </div>
  );

  // Win
  if (won) return (
    <div className="game-screen center-content" style={{minHeight:"100vh"}}>
      <div className="big-emoji">🎉</div>
      <div className="big-title">Congratulations!</div>
      <p className="sub-text">Completed in {fmt(timer)}</p>
      <p className="sub-text" style={{fontSize:15,textTransform:"capitalize"}}>Difficulty: {difficulty}</p>
      <button className="primary-btn" onClick={()=>{setDifficulty(null);setGame(null);}}>Play Again</button>
    </div>
  );

  // Game board
  return (
    <div className="game-screen">
      <div className="game-header">
        <button className="back-btn" onClick={()=>{clearInterval(timerRef.current);setDifficulty(null);setGame(null);}}>← Back</button>
        <span style={{color:"#8E8E93",fontSize:15,fontVariantNumeric:"tabular-nums"}}>{fmt(timer)}</span>
        <span style={{fontSize:13,color:"#0A84FF",textTransform:"capitalize"}}>{difficulty}</span>
      </div>
      <div className="sudoku-grid">
        {board && board.map((row,r) => row.map((cell,c) => {
          const isPre = game.puzzle[r][c]!==0;
          const isSel = selected && selected[0]===r && selected[1]===c;
          const isErr = errors.has(`${r}-${c}`);
          const sameNum = selected && cell!==0 && board[selected[0]][selected[1]]===cell;
          const sameRow = selected && selected[0]===r;
          const sameCol = selected && selected[1]===c;
          const sameBox = selected && Math.floor(selected[0]/3)===Math.floor(r/3) && Math.floor(selected[1]/3)===Math.floor(c/3);
          const hl = !isSel && (sameRow||sameCol||sameBox);
          return (
            <button key={`${r}-${c}`} className="sudoku-cell" onClick={()=>setSelected([r,c])} style={{
              background: isSel?"#0A84FF":isErr?"rgba(255,59,48,0.2)":sameNum?"rgba(10,132,255,0.15)":hl?"rgba(255,255,255,0.04)":"#1C1C1E",
              borderRight: (c+1)%3===0&&c<8?"2px solid #48484A":"1px solid #2C2C2E",
              borderBottom: (r+1)%3===0&&r<8?"2px solid #48484A":"1px solid #2C2C2E",
              color: isSel?"#fff":isErr?"#FF453A":isPre?"#fff":"#0A84FF",
              fontWeight: isPre?700:500,
            }}>{cell!==0?cell:""}</button>
          );
        }))}
      </div>
      <div className="numpad">
        {[1,2,3,4,5,6,7,8,9].map(n=>(
          <button key={n} className="num-btn" onClick={()=>handleNum(n)}>{n}</button>
        ))}
      </div>
      <div className="action-btns">
        <button className="action-btn" style={{color:"#FF453A"}} onClick={handleErase}>Erase</button>
        <button className="action-btn" style={{color:"#FFD60A"}} onClick={handleHint}>Hint</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// MEMORY GAME
// ══════════════════════════════════════
function MemoryGame({ onBack }) {
  const emojis = ["🐶","🐱","🦊","🐻","🐼","🐨","🦁","🐸"];
  const [cards, setCards] = useState([]);
  const [flipped, setFlipped] = useState([]);
  const [matched, setMatched] = useState(new Set());
  const [moves, setMoves] = useState(0);
  const [won, setWon] = useState(false);

  const init = () => {
    setCards([...emojis,...emojis].sort(()=>Math.random()-0.5).map((e,i)=>({id:i,emoji:e})));
    setFlipped([]); setMatched(new Set()); setMoves(0); setWon(false);
  };
  useEffect(init, []);

  const handleFlip = (idx) => {
    if (flipped.length>=2||flipped.includes(idx)||matched.has(cards[idx].emoji)) return;
    const nf=[...flipped,idx]; setFlipped(nf);
    if (nf.length===2) {
      setMoves(m=>m+1);
      if (cards[nf[0]].emoji===cards[nf[1]].emoji) {
        const nm=new Set(matched); nm.add(cards[nf[0]].emoji); setMatched(nm); setFlipped([]);
        if (nm.size===emojis.length) setWon(true);
      } else setTimeout(()=>setFlipped([]),800);
    }
  };

  return (
    <div className="game-screen">
      <div className="game-header">
        <button className="back-btn" onClick={onBack}><span className="back-arrow">‹</span> Games</button>
        <span style={{color:"#8E8E93",fontSize:15}}>Moves: {moves}</span>
      </div>
      {won ? (
        <div className="center-content">
          <div className="big-emoji">🏆</div>
          <div className="big-title">You Won!</div>
          <p className="sub-text">Completed in {moves} moves</p>
          <button className="primary-btn" onClick={init}>Play Again</button>
        </div>
      ) : (
        <div className="memory-grid">
          {cards.map((card,i) => {
            const show = flipped.includes(i)||matched.has(card.emoji);
            return (
              <button key={card.id} className="mem-card" onClick={()=>handleFlip(i)} style={{
                background: show?"#1C1C1E":"linear-gradient(135deg,#0A84FF,#5E5CE6)",
              }}>{show?card.emoji:"❓"}</button>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════
// 2048 GAME
// ══════════════════════════════════════
function Game2048({ onBack }) {
  const S=4;
  function addRandom(b) {
    const e=[]; for(let r=0;r<S;r++) for(let c=0;c<S;c++) if(b[r][c]===0) e.push([r,c]);
    if(!e.length) return; const [r,c]=e[Math.floor(Math.random()*e.length)];
    b[r][c]=Math.random()<0.9?2:4;
  }
  const initBoard=()=>{ const b=Array.from({length:S},()=>Array(S).fill(0)); addRandom(b); addRandom(b); return b; };

  const [board, setBoard] = useState(initBoard);
  const [score, setScore] = useState(0);
  const [gameOver, setGameOver] = useState(false);

  const slide=(row)=>{
    let a=row.filter(x=>x!==0), s=0;
    for(let i=0;i<a.length-1;i++) if(a[i]===a[i+1]){a[i]*=2;s+=a[i];a[i+1]=0;}
    a=a.filter(x=>x!==0); while(a.length<S) a.push(0);
    return {result:a,score:s};
  };

  const move = useCallback((dir)=>{
    if(gameOver) return;
    let b=board.map(r=>[...r]), moved=false, addedScore=0;
    const process=(getR,setR)=>{
      for(let i=0;i<S;i++){
        const row=getR(b,i); const{result,score:s}=slide(row);
        if(result.some((v,j)=>v!==row[j])) moved=true;
        addedScore+=s; setR(b,i,result);
      }
    };
    if(dir==="left") process((b,r)=>b[r],(b,r,v)=>b[r]=v);
    if(dir==="right") process((b,r)=>[...b[r]].reverse(),(b,r,v)=>b[r]=v.reverse());
    if(dir==="up") process((b,c)=>b.map(r=>r[c]),(b,c,v)=>v.forEach((val,r)=>b[r][c]=val));
    if(dir==="down") process((b,c)=>b.map(r=>r[c]).reverse(),(b,c,v)=>v.reverse().forEach((val,r)=>b[r][c]=val));
    if(moved){
      addRandom(b); setBoard(b); setScore(sc=>sc+addedScore);
      let hm=false;
      for(let r=0;r<S;r++) for(let c=0;c<S;c++){
        if(b[r][c]===0) hm=true;
        if(c<S-1&&b[r][c]===b[r][c+1]) hm=true;
        if(r<S-1&&b[r][c]===b[r+1][c]) hm=true;
      }
      if(!hm) setGameOver(true);
    }
  },[board,gameOver]);

  useEffect(()=>{
    const h=(e)=>{
      if(e.key==="ArrowLeft") move("left");
      if(e.key==="ArrowRight") move("right");
      if(e.key==="ArrowUp"){e.preventDefault();move("up");}
      if(e.key==="ArrowDown"){e.preventDefault();move("down");}
    };
    window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h);
  },[move]);

  const touchRef=useRef(null);
  const onTS=(e)=>{touchRef.current={x:e.touches[0].clientX,y:e.touches[0].clientY};};
  const onTE=(e)=>{
    if(!touchRef.current) return;
    const dx=e.changedTouches[0].clientX-touchRef.current.x;
    const dy=e.changedTouches[0].clientY-touchRef.current.y;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20) move(dx>0?"right":"left");
    else if(Math.abs(dy)>20) move(dy>0?"down":"up");
    touchRef.current=null;
  };

  const colors={0:"#2C2C2E",2:"#3A3A3C",4:"#48484A",8:"#FF9F0A",16:"#FF6B35",32:"#FF453A",64:"#FF2D55",128:"#FFD60A",256:"#FFD60A",512:"#FFD60A",1024:"#30D158",2048:"#0A84FF"};

  return (
    <div className="game-screen" onTouchStart={onTS} onTouchEnd={onTE}>
      <div className="game-header">
        <button className="back-btn" onClick={onBack}><span className="back-arrow">‹</span> Games</button>
        <span style={{color:"#FFD60A",fontSize:17,fontWeight:700}}>Score: {score}</span>
      </div>
      {gameOver && (
        <div style={{textAlign:"center",padding:"20px 0"}}>
          <p style={{color:"#FF453A",fontSize:20,fontWeight:700,marginBottom:8}}>Game Over!</p>
          <button className="primary-btn" style={{marginTop:0,padding:"10px 24px",fontSize:15,borderRadius:10}} onClick={()=>{setBoard(initBoard());setScore(0);setGameOver(false);}}>Restart</button>
        </div>
      )}
      <div className="grid-2048">
        {board.flat().map((val,i)=>(
          <div key={i} className="tile-2048" style={{
            background:colors[val]||"#0A84FF",
            fontSize:val>=1000?18:val>=100?22:26,
            color:val<=4?"#8E8E93":"#fff",
          }}>{val!==0?val:""}</div>
        ))}
      </div>
      <p style={{textAlign:"center",color:"#48484A",fontSize:13,padding:"16px 0"}}>Swipe or use arrow keys</p>
    </div>
  );
}
